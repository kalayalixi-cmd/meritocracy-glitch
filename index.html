<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meritocracy Glitch</title>

  <link rel="stylesheet" href="./globals.css" />
  <link rel="stylesheet" href="./styleguide.css" />
  <link rel="stylesheet" href="./style.css" />

  <script
    type="module"
    src="https://unpkg.com/@splinetool/viewer@1.12.88/build/spline-viewer.js">
  </script>
</head>
<body>
  <!-- PAGE 1: LOGIN -->
  <main id="page-login" class="page active">
    <div class="design-canvas">
      <img class="page-bg" src="./img/page1-login.png" alt="Login page background" />

      <button
        class="hotspot hotspot-purpose-top"
        onclick="showPage('page-purpose')"
        aria-label="Open purpose">
      </button>

      <button
        class="hotspot hotspot-quiz-top"
        onclick="alert('Quiz page not implemented in this version.')"
        aria-label="Quiz">
      </button>

      <button
        class="hotspot hotspot-login"
        onclick="startExperience()"
        aria-label="Initiate workflow">
      </button>
    </div>
  </main>

  <!-- PAGE PURPOSE -->
  <main id="page-purpose" class="page">
    <div class="design-canvas">
      <img class="page-bg" src="./img/page1-purpose.png" alt="Purpose page background" />

      <button
        class="hotspot hotspot-purpose-back"
        onclick="showPage('page-login')"
        aria-label="Back to login">
      </button>
    </div>
  </main>

  <!-- PAGE 2: ANXIETY -->
  <main id="page-anxiety" class="page">
    <div class="design-canvas">
      <div id="anxiety-spline-window">
        <spline-viewer
          id="anxiety-spline"
          loading-anim-type="spinner-small-dark"
          url="https://prod.spline.design/lSshTXEULNYYXH4z/scene.splinecode">
        </spline-viewer>
      </div>

      <section id="ui-anxiety" class="ui-layer active-ui">
        <img class="page-bg ui-image" src="./img/page2-anxiety-scene.png" alt="Anxiety UI" />

        <div id="overlay-add1" class="overlay hidden">
          <img class="page-bg overlay-img" src="./img/page2-anxiety-scene-add1.png" alt="Anxiety overlay 1" />
        </div>

        <div id="overlay-add2" class="overlay hidden">
          <img class="page-bg overlay-img" src="./img/page2-anxiety-scene-add2.png" alt="Anxiety overlay 2" />
        </div>

        <div id="overlay-add3" class="overlay hidden">
          <img class="page-bg overlay-img" src="./img/page2-anxiety-scene-add3.png" alt="Anxiety overlay 3" />
        </div>

        <div id="overlay-error" class="overlay hidden">
          <img class="page-bg overlay-img" src="./img/page2-anxiety-scene-error.png" alt="Error overlay" />
        </div>

        <button
          class="hotspot hotspot-purpose-top"
          onclick="showPage('page-purpose')"
          aria-label="Open purpose">
        </button>

        <button
          class="hotspot hotspot-quiz-top"
          onclick="alert('Quiz page not implemented in this version.')"
          aria-label="Quiz">
        </button>
      </section>
    </div>
  </main>

  <!-- PAGE 3: COMFORT -->
  <main id="page-comfort" class="page">
    <div class="design-canvas">
      <div id="comfort-spline-fullscreen">
        <spline-viewer
          id="comfort-spline"
          loading-anim-type="spinner-small-dark"
          url="https://prod.spline.design/Wnp9jX4BAzSUkXES/scene.splinecode">
        </spline-viewer>
      </div>

      <section id="ui-comfort" class="ui-layer active-ui">
        <img class="page-bg ui-image" src="./img/page3-comfort-scene.png" alt="Comfort UI" />

        <div id="particle-layer">
          <div class="particle p1"></div>
          <div class="particle p2"></div>
          <div class="particle p3"></div>
          <div class="particle p4"></div>
          <div class="particle p5"></div>
          <div class="particle p6"></div>
          <div class="particle p7"></div>
          <div class="particle p8"></div>
          <div class="particle p9"></div>
          <div class="particle p10"></div>
          <div class="particle p11"></div>
          <div class="particle p12"></div>
        </div>
      </section>
    </div>
  </main>

  <!-- PAGE 4: VOID -->
  <main id="page-void" class="page">
    <div class="design-canvas">
      <div id="void-spline-fullscreen">
        <spline-viewer
          id="void-spline"
          loading-anim-type="spinner-small-dark"
          url="https://prod.spline.design/Wnp9jX4BAzSUkXES/scene.splinecode">
        </spline-viewer>
      </div>

      <section id="ui-void" class="ui-layer active-ui">
        <img class="page-bg ui-image" src="./img/page4-void.png" alt="Void UI" />

        <button
          class="hotspot hotspot-exit"
          onclick="exitToLogin()"
          aria-label="Exit to login">
        </button>
      </section>
    </div>
  </main>

  <script>
    let currentPage = "page-login";
    let idleTimer = null;
    let comfortParticlesRemaining = 12;

    // slower anxiety progression
    let scrollProgress = 0;
    let lastWheelTime = 0;
    let decayTimer = null;

    const IDLE_TIME = 5000;
    const COMFORT_SWITCH_DELAY = 2500;

    const overlayAdd1 = document.getElementById("overlay-add1");
    const overlayAdd2 = document.getElementById("overlay-add2");
    const overlayAdd3 = document.getElementById("overlay-add3");
    const overlayError = document.getElementById("overlay-error");

    function showPage(pageId) {
      document.querySelectorAll(".page").forEach((page) => {
        page.classList.remove("active");
      });

      const next = document.getElementById(pageId);
      if (next) next.classList.add("active");

      currentPage = pageId;
    }

    function resetAnxietyOverlays() {
      overlayAdd1.classList.add("hidden");
      overlayAdd2.classList.add("hidden");
      overlayAdd3.classList.add("hidden");
      overlayError.classList.add("hidden");
    }

    function updateAnxietyOverlays() {
      if (scrollProgress >= 30) overlayAdd1.classList.remove("hidden");
      if (scrollProgress >= 60) overlayAdd2.classList.remove("hidden");
      if (scrollProgress >= 90) overlayAdd3.classList.remove("hidden");
      if (scrollProgress >= 120) overlayError.classList.remove("hidden");
    }

    function startExperience() {
      scrollProgress = 0;
      comfortParticlesRemaining = 12;

      clearTimeout(idleTimer);
      clearTimeout(decayTimer);
      resetAnxietyOverlays();

      document.querySelectorAll(".particle").forEach((p) => {
        p.classList.remove("gone");
      });

      showPage("page-anxiety");
    }

    function exitToLogin() {
      clearTimeout(idleTimer);
      clearTimeout(decayTimer);
      showPage("page-login");
    }

    function scheduleDecay() {
      clearTimeout(decayTimer);

      decayTimer = setTimeout(() => {
        // 停下后不清零，只是稍微回落一点点，保留之前的累积感
        scrollProgress = Math.max(0, scrollProgress - 6);
      }, 1200);
    }

    window.addEventListener(
      "wheel",
      (e) => {
        if (currentPage !== "page-anxiety") return;

        clearTimeout(idleTimer);

        const now = Date.now();
        const gap = now - lastWheelTime;
        lastWheelTime = now;

        // 滚动越连续，涨得稍微多一点；但总体非常慢
        let gain = 2.2;
        if (gap < 120) gain = 3.2;
        else if (gap < 220) gain = 2.6;

        // 大幅滚轮稍微再加一点
        const delta = Math.abs(e.deltaY);
        if (delta > 120) gain += 0.6;

        scrollProgress = Math.min(140, scrollProgress + gain);
        updateAnxietyOverlays();
        scheduleDecay();

        idleTimer = setTimeout(() => {
          setTimeout(() => {
            showPage("page-comfort");
          }, COMFORT_SWITCH_DELAY);
        }, IDLE_TIME);
      },
      { passive: true }
    );

    function removeOneParticle(x, y) {
      if (currentPage !== "page-comfort") return;

      const particles = Array.from(
        document.querySelectorAll(".particle:not(.gone)")
      );

      if (!particles.length) return;

      let closest = particles[0];
      let closestDistance = Infinity;

      particles.forEach((p) => {
        const rect = p.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dist = Math.hypot(cx - x, cy - y);

        if (dist < closestDistance) {
          closestDistance = dist;
          closest = p;
        }
      });

      if (closest && closestDistance < 220) {
        closest.classList.add("gone");
        comfortParticlesRemaining -= 1;
      }

      if (comfortParticlesRemaining <= 0) {
        setTimeout(() => {
          showPage("page-void");
        }, 1800);
      }
    }

    window.addEventListener("mousemove", (e) => {
      removeOneParticle(e.clientX, e.clientY);
    });
  </script>
</body>
</html>
